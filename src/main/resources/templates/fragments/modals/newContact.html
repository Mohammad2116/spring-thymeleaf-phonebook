<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
 	<div th:fragment="newModal" class="modal fade" id="newModal" tabindex="-1" aria-hidden="true">
	    <div class="modal-dialog modal-dialog-centered">
	        <div class="modal-content">
	            <div class="modal-header">
	                <h5 class="modal-title">New Contact</h5>
	                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
	            </div>	  	        
	        	
	            <div class="modal-body">
  				    <form th:action="@{/contacts/save}" th:object="${contactCreateForm}" method="post" class="mt-3">
				        <div class="mb-3">
				            <label>First name</label>
				            <input class="form-control" th:field="*{firstName}" id="new-fisrtName">
				            <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
				        </div>
				        <div class="mb-3">
				            <label>Last name</label>
				            <input class="form-control" th:field="*{lastName}" id="new-lastName">
				            <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
				        </div>					        
						<div class="mb-3">
				            <label>Email</label>
				            <input class="form-control" th:field="*{email}" id="new-email">
				            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
				        </div>
				        <div class="mb-3">
				            <label>Phone</label>
				            <input class="form-control" th:field="*{phone}" id="new-phone">
				            <small class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
				        </div>
						
						<div class="modal-footer">
				        	<button class="btn btn-success">Save</button>
				        	<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
				        </div>
				    </form>
				</div>
			</div>
		</div>
	</div> 
</html>
