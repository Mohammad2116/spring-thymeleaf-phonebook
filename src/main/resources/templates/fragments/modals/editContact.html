<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
 	<div th:fragment="editModal" class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
	    <div class="modal-dialog modal-dialog-centered">
	        <div class="modal-content">

	            <div class="modal-header">
	                <h5 class="modal-title">Update Contact</h5>
	                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
	            </div>	        
	        
	            <div class="modal-body">
				    <form th:action="@{/contacts/edit}" th:object="${contactUpdateForm}" method="post" class="mt-3">
				    	<input type="hidden" th:field="*{id}" id="edit-id">
				        <div class="mb-3">
				            <label>First name</label>
				            <input class="form-control" th:field="*{firstName}" id="edit-firstName">
				            <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
				        </div>
				        <div class="mb-3">
				            <label>Last name</label>
				            <input class="form-control" th:field="*{lastName}" id="edit-lastName">
				            <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
				        </div>					        
						<div class="mb-3">
				            <label>Email</label>
				            <input class="form-control" th:field="*{email}" id="edit-email">
				            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
				        </div>
				        <div class="mb-3">
				            <label>Phone</label>
				            <input class="form-control" th:field="*{phone}" id="edit-phone">
				            <small class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
				        </div>
				
		               <div class="modal-footer">
	                        <button class="btn btn-success">Save</button>
	                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
	                    </div>
				    </form> 
			    </div>
			</div>
		</div>
	</div> 
</html>
